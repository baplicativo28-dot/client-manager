app = "cm-whatsapp-server"
primary_region = "gru"

[build]

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"

[mounts]
  source = "whatsapp_auth"
  destination = "/app/auth_info"
